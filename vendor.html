<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Profile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
.top-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 20px;display:flex;align-items:center;justify-content:flex-start;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#555;cursor:pointer;background:none;border:none;font-family:inherit;}
.back-btn:hover{color:#E8670A;}
.all-btn{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#E8670A;text-decoration:none;border:1px solid #E8670A;padding:6px 16px;border-radius:999px;transition:all 0.2s;}
.all-btn:hover{background:#E8670A;color:#fff;}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;color:#888;}
.spinner{width:44px;height:44px;border:3px solid #e0e0e0;border-top-color:#7c3aed;border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.page-wrap{display:flex;justify-content:center;padding:2rem 1rem 4rem;}
.vendor-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:16px;overflow:hidden;width:100%;max-width:860px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.hero{padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;}
.hero-glow{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
.logo-ring{width:96px;height:96px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;position:relative;z-index:1;overflow:hidden;}
.logo-ring img{width:86px;height:86px;object-fit:contain;}
.vendor-name{font-size:22px;font-weight:500;position:relative;z-index:1;letter-spacing:0.02em;}
.vendor-sub{font-size:14px;margin-top:5px;position:relative;z-index:1;opacity:0.85;}
.stars{display:flex;justify-content:center;gap:4px;margin-top:10px;position:relative;z-index:1;}
.star{color:#fbbf24;font-size:16px;}
.badge{display:inline-block;font-size:11px;padding:3px 12px;border-radius:99px;margin-top:8px;font-weight:500;position:relative;z-index:1;}
.body{padding:1.75rem;}
.tagline{font-size:14px;color:#666;line-height:1.7;text-align:center;border-bottom:0.5px solid #e0e0e0;padding-bottom:1.25rem;margin-bottom:1.5rem;}
.sec-label{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;text-align:center;}
.services{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.75rem;}
@media(max-width:600px){.services{grid-template-columns:repeat(2,1fr);}}
.svc-chip{background:#f8f8f8;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.svc-icon{font-size:20px;}
.svc-label{font-size:11px;color:#555;font-weight:500;line-height:1.3;}
.yt-section{margin-bottom:1.75rem;}
.yt-main{border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#000;margin-bottom:10px;}
.yt-main iframe{width:100%;height:100%;border:none;display:block;}
.yt-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.yt-thumb{border-radius:8px;overflow:hidden;aspect-ratio:16/9;cursor:pointer;position:relative;border:2px solid transparent;transition:border 0.15s;}
.yt-thumb.active{border-color:#7c3aed;}
.yt-thumb:hover{opacity:0.85;}
.yt-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.yt-play-ov{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;}
.play-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;}
.play-tri{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:13px solid #7c3aed;margin-left:3px;}
.thumb-title{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.65);color:#fff;font-size:10px;padding:4px 6px;line-height:1.3;}
.contact{border-top:0.5px solid #e0e0e0;padding-top:1.5rem;}
.phones{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.phone-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:8px;background:#f8f8f8;border:0.5px solid #e0e0e0;font-size:13px;font-weight:500;color:#222;text-decoration:none;}
.phone-btn:hover{background:#efefef;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:8px;background:#25D366;font-size:13px;font-weight:600;color:#fff;text-decoration:none;margin-bottom:8px;}
.wa-btn:hover{background:#1ebe5d;}
.social-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.soc-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;background:#f8f8f8;border:0.5px solid #e0e0e0;border-radius:8px;text-decoration:none;transition:background 0.15s;}
.soc-btn:hover{background:#ede9fe;}
.soc-btn span{font-size:11px;color:#555;font-weight:500;}
.soc-btn svg{width:22px;height:22px;}

.gallery-wrap{margin-bottom:1.75rem;}
.gallery-slider{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:4px;}
.gallery-slider::-webkit-scrollbar{display:none;}
.gallery-thumb{flex:0 0 160px;height:120px;border-radius:10px;overflow:hidden;cursor:pointer;scroll-snap-align:start;position:relative;}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
.gallery-thumb:hover img{transform:scale(1.05);}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-close:hover{background:rgba(255,255,255,0.3);}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-prev{left:16px;}
.lightbox-next{right:16px;}
.lightbox-prev:hover,.lightbox-next:hover{background:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"></polyline></svg>
    Back
  </button>
</div>
<div class="loading-wrap" id="loadingWrap"><div class="spinner"></div><p>Loading profile...</p></div>
<div class="page-wrap" id="pageWrap" style="display:none;"><div class="vendor-card" id="vendorCard"></div></div>
<script>
const SHEETS_URL='https://opensheet.elk.sh/1CaYOuLNAU3b-MIm-8lAXiH8RZErrI2n3epzrr4W6T1o/1';
const FALLBACK='https://images.unsplash.com/photo-1470509037663-253afd7f0f51?auto=format&fit=crop&w=600&q=80';
const CAT_PAGES={
  'Photography':'https://www.ushindurituals.com/photo-video',
  'Decoration':'https://www.ushindurituals.com/decoration-service',
  'Makeup':'https://www.ushindurituals.com/find-your-makeup-artist',
  'Catering':'https://www.ushindurituals.com',
  'Priest / Pandit':'https://www.ushindurituals.com',
  '🏠 Realtor':'https://www.ushindurituals.com',
  '🏢 Indian Owned Business':'https://www.ushindurituals.com',
  'Other':'https://www.ushindurituals.com'
};
const THEMES={
  Photography:{bg:'#1a0a2e',glow:'rgba(139,92,246,0.35)',ring:'rgba(167,139,250,0.6)',name:'#e9d5ff',sub:'#a78bfa',badge:'#EEEDFE',badgeC:'#3C3489'},
  Makeup:{bg:'#1a0a1a',glow:'rgba(236,72,153,0.28)',ring:'rgba(249,168,212,0.6)',name:'#fce7f3',sub:'#f9a8d4',badge:'#fce7f3',badgeC:'#831843'},
  Decoration:{bg:'#1a100a',glow:'rgba(251,191,36,0.28)',ring:'rgba(253,230,138,0.6)',name:'#fef3c7',sub:'#fcd34d',badge:'#fef3c7',badgeC:'#92400e'},
  Catering:{bg:'#0a1a14',glow:'rgba(20,184,166,0.28)',ring:'rgba(94,234,212,0.6)',name:'#ccfbf1',sub:'#5eead4',badge:'#ccfbf1',badgeC:'#134e4a'},
  '🏠 Realtor':{bg:'#0a1220',glow:'rgba(59,130,246,0.28)',ring:'rgba(147,197,253,0.6)',name:'#dbeafe',sub:'#93c5fd',badge:'#dbeafe',badgeC:'#1e3a5f'},
  '🏢 Indian Owned Business':{bg:'#1a0a0a',glow:'rgba(220,38,38,0.25)',ring:'rgba(252,165,165,0.6)',name:'#fee2e2',sub:'#fca5a5',badge:'#fee2e2',badgeC:'#7f1d1d'},
  default:{bg:'#1a0a2e',glow:'rgba(139,92,246,0.35)',ring:'rgba(167,139,250,0.6)',name:'#e9d5ff',sub:'#a78bfa',badge:'#EEEDFE',badgeC:'#3C3489'}
};
const EMOJIS={'Weddings':'💍','Wedding':'💍','Housewarming':'🏠','Baby Shower':'🍼','Gender Reveal':'🎀','Birthdays':'🎂','Birthday':'🎂','Naming Ceremony':'🪔','Arangetram':'🎭','Annaprashanam':'🌾','Functions':'🎊','Saree Function':'👘','Catering':'🍽️','Poojas':'🪔','All Occasions':'📸'};

let vendorCategory='';

function goBack(){
  if(window.opener){
    window.close();
  } else {
    window.location.href=(CAT_PAGES[vendorCategory]||'https://www.ushindurituals.com');
  }
}

async function loadVendor(){
  const params=new URLSearchParams(window.location.search);
  const name=params.get('name');
  if(!name){window.location.href='index.html';return;}
  document.title=name+' — US Hindu Rituals';
  try{
    const res=await fetch(SHEETS_URL);
    const all=await res.json();
    const f=all.find(function(r){return r.Name&&r.Name.trim().toLowerCase()===name.trim().toLowerCase();});
    if(!f) throw new Error('Vendor not found');
    renderVendor(f);
  }catch(e){
    document.getElementById('loadingWrap').innerHTML=`<p style="color:#ef4444;text-align:center;padding:2rem">⚠️ ${e.message}</p>`;
  }
}

function renderVendor(f){
  vendorCategory=f.Category||'';
  const t=THEMES[f.Category]||THEMES.default;
  const services=f.Services?f.Services.split(',').map(s=>{
    const label=s.trim().replace(/^\p{Emoji}\s*/u,'').trim();
    const emoji=EMOJIS[label]||'✨';
    return `<div class="svc-chip"><span class="svc-icon">${emoji}</span><span class="svc-label">${label}</span></div>`;
  }).join(''):'';
  const videos=[{id:f.Video1,title:f.Video1_Title||'Video 1'},{id:f.Video2,title:f.Video2_Title||'Video 2'},{id:f.Video3,title:f.Video3_Title||'Video 3'},{id:f.Video4,title:f.Video4_Title||'Video 4'}].filter(v=>v.id&&v.id.trim());
  var galleryPhotos=f.Photos?f.Photos.split(',').map(function(u){return u.trim();}).filter(Boolean):[];
  var gallerySection=galleryPhotos.length?
    '<div class="gallery-wrap"><div class="sec-label">📸 Portfolio</div><div class="gallery-slider">'
    +galleryPhotos.map(function(url,i){
      return '<div class="gallery-thumb" onclick="openLightbox([\''+galleryPhotos.join("','")+'\'],'+i+')">'
        +'<img src="'+url+'" loading="lazy" alt="Photo '+i+'"></div>';
    }).join('')
    +'</div></div>':'';

  const ytSection=videos.length?`<div class="yt-section"><div class="sec-label">▶ Our Work</div><div class="yt-main"><iframe id="ytFrame" src="https://www.youtube.com/embed/${videos[0].id}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>${videos.length>1?`<div class="yt-thumbs">${videos.map((v,i)=>`<div class="yt-thumb${i===0?' active':''}" onclick="playVid('${v.id}',this)"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy"><div class="yt-play-ov"><div class="play-btn"><div class="play-tri"></div></div></div><div class="thumb-title">${v.title}</div></div>`).join('')}</div>`:''}</div>`:'';
  const phones=[f.Phone1,f.Phone2].filter(p=>p&&p.trim()).map(p=>`<a class="phone-btn" href="tel:${p.replace(/\D/g,'')}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.06 1.22 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>${p}</a>`).join('');
  const wa=f.WhatsApp&&f.WhatsApp.trim()?`<a class="wa-btn" href="https://wa.me/${f.WhatsApp.replace(/\D/g,'')}" target="_blank"><svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M16 2C8.27 2 2 8.27 2 16c0 2.44.65 4.73 1.78 6.72L2 30l7.5-1.75A13.93 13.93 0 0016 30c7.73 0 14-6.27 14-14S23.73 2 16 2zm6.3 19.88c-.35-.17-2.05-.99-2.37-1.1-.32-.12-.55-.17-.78.17-.23.35-.9 1.1-1.1 1.33-.2.22-.4.25-.75.08-2.07-.97-3.43-1.73-4.8-3.93-.36-.62.36-.58.99-1.93.11-.23.06-.43-.03-.6-.08-.17-.78-1.88-1.07-2.57-.28-.67-.57-.58-.78-.59h-.67c-.23 0-.6.08-.91.43-.32.35-1.2 1.17-1.2 2.85 0 1.68 1.23 3.3 1.4 3.53.17.23 2.4 3.67 5.83 5.15 2.17.93 3.02 1.01 4.1.85.66-.1 2.05-.84 2.34-1.64.29-.8.29-1.49.2-1.64-.08-.14-.3-.22-.65-.4z" fill="white"/></svg>Book Now on WhatsApp</a>`:'';
  const socials=[f.Facebook&&{href:f.Facebook,label:'Facebook',icon:`<svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.5h-2.79V24C19.61 23.1 24 18.1 24 12.07z"/></svg>`},f.Instagram&&{href:f.Instagram,label:'Instagram',icon:`<svg viewBox="0 0 24 24"><defs><radialGradient id="ig" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><path fill="url(#ig)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`},f.YouTube_Channel&&{href:f.YouTube_Channel,label:'YouTube',icon:`<svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`},f.Website&&{href:f.Website,label:'Website',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`},f.Email&&{href:`mailto:${f.Email}`,label:'Email',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`}].filter(Boolean);

  document.getElementById('vendorCard').innerHTML=`<div class="hero" style="background:${t.bg}"><div class="hero-glow" style="background:radial-gradient(ellipse at 50% 0%,${t.glow} 0%,transparent 65%)"></div><div class="logo-ring" style="border-color:${t.ring}"><img src="${f.Logo_URL||FALLBACK}" alt="${f.Name||''}" onerror="this.src='${FALLBACK}'"></div><div class="vendor-name" style="color:${t.name}">${f.Name||''}</div><div class="vendor-sub" style="color:${t.sub}">${f.Category||''}${f.Location?' · '+f.Location:''}</div><div class="stars">★★★★★</div><span class="badge" style="background:${t.badge};color:${t.badgeC}">${f.Location||''}</span></div><div class="body">${f.Tagline?`<p class="tagline">${f.Tagline}</p>`:''} ${services?`<div class="sec-label">Services</div><div class="services">${services}</div>`:''} ${ytSection}${gallerySection}<div class="contact"><div class="sec-label">Contact &amp; Connect</div>${phones?`<div class="phones">${phones}</div>`:''} ${wa} ${socials.length?`<div class="social-row">${socials.map(s=>`<a class="soc-btn" href="${s.href}" target="_blank">${s.icon}<span>${s.label}</span></a>`).join('')}</div>`:''}</div></div>`;
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('pageWrap').style.display='flex';
}

function playVid(id,thumb){
  document.getElementById('ytFrame').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
  document.querySelectorAll('.yt-thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
}

loadVendor();

var lightboxPhotos=[];
var lightboxIndex=0;

function openLightbox(photos,idx){
  lightboxPhotos=photos;
  lightboxIndex=idx;
  document.getElementById('lightboxImg').src=photos[idx];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox(e){
  if(e.target===document.getElementById('lightbox')) closeLightboxBtn();
}
function closeLightboxBtn(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
function lightboxPrev(e){
  e.stopPropagation();
  lightboxIndex=(lightboxIndex-1+lightboxPhotos.length)%lightboxPhotos.length;
  document.getElementById('lightboxImg').src=lightboxPhotos[lightboxIndex];
}
function lightboxNext(e){
  e.stopPropagation();
  lightboxIndex=(lightboxIndex+1)%lightboxPhotos.length;
  document.getElementById('lightboxImg').src=lightboxPhotos[lightboxIndex];
}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowLeft') lightboxPrev({stopPropagation:function(){}});
  if(e.key==='ArrowRight') lightboxNext({stopPropagation:function(){}});
  if(e.key==='Escape') closeLightboxBtn();
});
</script>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
  <button class="lightbox-prev" onclick="lightboxPrev(event)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-next" onclick="lightboxNext(event)">›</button>
</div>
</body>
</html>
