<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Experts — US Hindu Rituals</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--saffron:#E8670A;--saffron-glow:rgba(232,103,10,0.12);--gold:#C8961A;--gold-light:#F0BF40;--deep:#140A00;--cream:#FDF7EF;--warm:#F7EDD8;--border:rgba(200,150,26,0.18);--border-hover:rgba(232,103,10,0.32);--overlay:rgba(14,7,0,0.68);--text-muted:#8a7e72;--text-body:#4a3f32;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--deep);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}
.hero{position:relative;background:linear-gradient(var(--overlay),var(--overlay)),url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;padding:90px 24px 88px;text-align:center;color:#fff;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:72px;background:linear-gradient(to top,var(--cream),transparent);pointer-events:none;}
.hero-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-light);margin-bottom:22px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:14px;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:36px;height:1px;background:rgba(240,191,64,0.4);}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(44px,6.5vw,74px);font-weight:700;line-height:1.06;margin-bottom:20px;}
.hero h1 em{font-style:italic;color:var(--gold-light);font-weight:500;}
.hero p{max-width:500px;margin:0 auto 34px;color:rgba(255,255,255,0.65);line-height:1.9;font-size:15px;font-weight:300;}
.hero-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.hero-pill{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.78);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;padding:7px 16px;border-radius:999px;font-weight:500;}
.filters-wrap{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 20px;background:rgba(253,247,239,0.98);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.filter-btn{padding:8px 20px;border:1px solid rgba(200,150,26,0.28);border-radius:999px;cursor:pointer;background:transparent;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-body);transition:all 0.2s;font-family:'Outfit',sans-serif;}
.filter-btn:hover{border-color:var(--saffron);color:var(--saffron);background:var(--saffron-glow);}
.filter-btn.active{background:var(--saffron);color:#fff;border-color:var(--saffron);}
.main-section{max-width:1400px;margin:0 auto;padding:48px 20px 80px;}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;gap:16px;}
.section-eyebrow{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:7px;}
.section-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--deep);line-height:1.1;}
.section-title em{font-style:italic;color:var(--saffron);}
.count-pill{background:var(--warm);border:1px solid var(--border);border-radius:999px;padding:7px 16px;font-size:12px;color:var(--text-muted);font-weight:500;white-space:nowrap;}
.count-pill b{color:var(--deep);font-weight:700;}
.expert-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
@media(max-width:1100px){.expert-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:760px){.expert-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.expert-grid{grid-template-columns:1fr;}}
.expert-card{display:flex;flex-direction:column;cursor:pointer;background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform 0.28s,box-shadow 0.28s;animation:fadeUp 0.5s ease both;}
.expert-card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(0,0,0,0.09);}
.card-photo-wrap{position:relative;width:100%;height:170px;background:var(--warm);overflow:hidden;}
.card-photo{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.55s;}
.card-photo.is-logo{object-fit:contain;padding:22px;background:#fff;}
.expert-card:hover .card-photo{transform:scale(1.06);}
.photo-cat{position:absolute;bottom:10px;left:10px;background:rgba(20,10,0,0.72);color:var(--gold-light);font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:999px;}
.card-body{padding:16px 15px 18px;display:flex;flex-direction:column;flex:1;}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:8px;color:var(--deep);}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.verified{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#1e7a47;border:1px solid rgba(30,122,71,0.26);background:rgba(30,122,71,0.07);padding:3px 8px;border-radius:999px;font-weight:600;}
.verified::before{content:'✓';font-size:8px;}
.loc{font-size:10px;color:var(--text-muted);display:inline-flex;align-items:center;gap:4px;}
.loc::before{content:'◎';font-size:8px;color:var(--saffron);}
.card-desc{font-size:12px;color:var(--text-body);line-height:1.7;flex:1;margin-bottom:13px;}
.card-cta{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--saffron);}
.card-cta::after{content:'→';}
.loading-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted);font-size:15px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-eyebrow">US Hindu Rituals</div>
  <h1>Meet Our<br><em>Trusted Experts</em></h1>
  <p>Handpicked specialists for Hindu weddings and celebrations across Bentonville &amp; Tulsa.</p>
  <div class="hero-pills">
    <span class="hero-pill">Photography</span>
    <span class="hero-pill">Decoration</span>
    <span class="hero-pill">Makeup</span>
  </div>
</div>
<div class="filters-wrap">
  <button class="filter-btn active" data-cat="All" onclick="filterExperts('All',this)">All</button>
  <button class="filter-btn" data-cat="Photography" onclick="filterExperts('Photography',this)">Photography</button>
  <button class="filter-btn" data-cat="Makeup" onclick="filterExperts('Makeup',this)">Makeup</button>
  <button class="filter-btn" data-cat="Decoration" onclick="filterExperts('Decoration',this)">Decoration</button>
  <button class="filter-btn" data-cat="Catering" onclick="filterExperts('Catering',this)">Catering</button>
  <button class="filter-btn" data-cat="Priest / Pandit" onclick="filterExperts('Priest / Pandit',this)">Priest</button>
  <button class="filter-btn" data-cat="Other" onclick="filterExperts('Other',this)">Other</button>
</div>
<div class="main-section">
  <div class="section-header">
    <div>
      <div class="section-eyebrow">Handpicked for you</div>
      <div class="section-title">Our <em>Experts</em></div>
    </div>
    <div class="count-pill"><b id="countNum">0</b> Experts</div>
  </div>
  <div class="expert-grid" id="expertGrid">
    <div class="loading-state"><div class="spinner"></div><p>Loading experts...</p></div>
  </div>
</div>
<script>
var SHEETS_URL='https://opensheet.elk.sh/1CaYOuLNAU3b-MIm-8lAXiH8RZErrI2n3epzrr4W6T1o/Imported%20table';
var VENDOR_PAGE='https://dsath92.github.io/vendors/vendor.html';
var FALLBACK='https://images.unsplash.com/photo-1470509037663-253afd7f0f51?auto=format&fit=crop&w=600&q=80';
var allExperts=[];

// JSON mode - no CSV parse needed

function loadExperts(){
  fetch(SHEETS_URL)
  .then(function(r){return r.json();})
  .then(function(data){
    allExperts=data.filter(function(f){
      return f.Status&&f.Status.trim().toLowerCase()==='approved';
    });
    renderExperts(allExperts);
  })
  .catch(function(e){
    document.getElementById('expertGrid').innerHTML='<div class="empty-state">Could not load vendors: '+e.message+'</div>';
  });
}

function filterExperts(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderExperts(cat==='All'?allExperts:allExperts.filter(function(e){return e.Category===cat;}));
}

function renderExperts(list){
  document.getElementById('countNum').textContent=list.length;
  if(!list.length){document.getElementById('expertGrid').innerHTML='<div class="empty-state">No experts found.</div>';return;}
  document.getElementById('expertGrid').innerHTML=list.map(function(e,i){
    var photo=e.Logo_URL||FALLBACK;
    var isLogo=!!e.Logo_URL;
    var desc=(e.Tagline||'').substring(0,100)+((e.Tagline||'').length>100?'...':'');
    return '<div class="expert-card" style="animation-delay:'+(i*0.07)+'s" onclick="goToVendor(\''+e.Name.replace(/'/g,"\\'")+'\')">'
      +'<div class="card-photo-wrap">'
      +'<img src="'+photo+'" alt="'+(e.Name||'')+'" class="card-photo'+(isLogo?' is-logo':'')+'" loading="lazy" onerror="this.src=\''+FALLBACK+'\'">'
      +'<span class="photo-cat">'+(e.Category||'')+'</span>'
      +'</div>'
      +'<div class="card-body">'
      +'<div class="card-name">'+(e.Name||'')+'</div>'
      +'<div class="card-meta"><span class="verified">Verified Expert</span>'+(e.Location?'<span class="loc">'+e.Location+'</span>':'')+'</div>'
      +'<div class="card-desc">'+desc+'</div>'
      +'<div class="card-cta">View Profile</div>'
      +'</div></div>';
  }).join('');
}

function goToVendor(name){
  window.open(VENDOR_PAGE+'?name='+encodeURIComponent(name),'_blank');
}

loadExperts();
setInterval(loadExperts,120000);

// Auto filter based on URL parameter
var urlCat=new URLSearchParams(window.location.search).get('cat');
if(urlCat){
  setTimeout(function(){
    var btn=document.querySelector('.filter-btn[data-cat="'+urlCat+'"]');
    if(btn){filterExperts(urlCat,btn);}
  },1000);
}
</script>
</body>
</html>
